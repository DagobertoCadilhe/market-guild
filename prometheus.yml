global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'player-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['player-service:8081']

  - job_name: 'market-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['market-service:8082']
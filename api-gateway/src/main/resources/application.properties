spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

logging.level.org.springframework.cloud.gateway=TRACE

spring.cloud.gateway.server.webmvc.routes[0].id=player-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://player-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/players/**

spring.cloud.gateway.server.webmvc.routes[1].id=market-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://market-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/market/**